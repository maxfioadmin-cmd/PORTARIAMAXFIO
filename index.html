<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Portaria · Acesso</title>
    <meta name="theme-color" content="#1a1d1f">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ink: #1a1d1f; --ink-soft: #4a5056;
            --paper: #f7f5f0; --paper-warm: #efeae0;
            --line: #d8d2c4; --accent: #c8553d;
            --ok: #2d6a4f; --warn: #b8860b; --err: #9b2c2c;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: 'Inter Tight', sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; }
        body {
            padding: 32px 16px;
            background-image:
                radial-gradient(circle at 20% 10%, rgba(200,85,61,.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 90%, rgba(45,106,79,.05) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            max-width: 400px; width: 100%;
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(26,29,31,.08), 0 1px 3px rgba(26,29,31,.05);
        }

        .header {
            padding: 36px 32px 28px;
            background: var(--ink);
            color: var(--paper);
            text-align: center;
            position: relative;
        }
        .header::after {
            content: ""; position: absolute; bottom: 0; left: 0; right: 0;
            height: 4px; background: var(--accent);
        }
        .logo-mark {
            width: 64px; height: 64px;
            margin: 0 auto 16px;
            background: var(--paper);
            color: var(--ink);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Fraunces', serif;
            font-size: 32px;
            font-weight: 700;
            position: relative;
        }
        .logo-mark::after {
            content: ""; position: absolute; bottom: -3px; left: 0; right: 0;
            height: 4px; background: var(--accent); border-radius: 0 0 8px 8px;
        }
        .eyebrow {
            font-size: 11px;
            letter-spacing: .2em;
            text-transform: uppercase;
            opacity: .7;
            margin-bottom: 6px;
        }
        .header h1 {
            font-family: 'Fraunces', serif;
            font-weight: 500;
            font-size: 22px;
            margin: 0;
            letter-spacing: -.01em;
        }
        .header .sub {
            font-size: 12px;
            opacity: .8;
            margin-top: 4px;
        }

        .body { padding: 32px; }

        .field { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--ink-soft);
            text-transform: uppercase;
            letter-spacing: .08em;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            font: inherit;
            font-size: 14px;
            border: 1px solid var(--line);
            border-radius: 3px;
            transition: border-color .15s, box-shadow .15s;
        }
        input:focus {
            outline: none;
            border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(26,29,31,.08);
        }

        button.primary {
            width: 100%;
            padding: 14px;
            background: var(--ink);
            color: var(--paper);
            border: none;
            border-radius: 3px;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: .02em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }
        button.primary:hover:not(:disabled) { background: #000; }
        button.primary:disabled { opacity: .6; cursor: not-allowed; }

        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(247,245,240,.3);
            border-top-color: var(--paper);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }
        button.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status {
            padding: 12px 14px;
            border-radius: 3px;
            font-size: 13px;
            display: none;
            margin-top: 16px;
        }
        .status.show { display: block; }
        .status.err { background: #fbeeee; color: var(--err); border-left: 3px solid var(--err); }
        .status.ok { background: #eef6f1; color: var(--ok); border-left: 3px solid var(--ok); }

        .foot {
            padding: 16px 32px;
            background: #fbfaf6;
            border-top: 1px solid var(--line);
            font-size: 11px;
            color: var(--ink-soft);
            text-align: center;
            letter-spacing: .04em;
        }
    </style>
<link rel="stylesheet" href="tema-escuro.css">
<script>try{var t=localStorage.getItem("portaria_tema");if(t)document.documentElement.setAttribute("data-tema",t);}catch(e){}</script>
</head>
<body>

<div class="login-card">
    <div class="header">
        <div class="logo-mark">P</div>
        <div class="eyebrow">Sistema</div>
        <h1>Controle de Portaria</h1>
        <div class="sub">Acesso restrito a usuários autorizados</div>
    </div>
    <div class="body">
        <form id="formLogin" autocomplete="off" novalidate>
            <div class="field">
                <label for="loginEmail">E-mail</label>
                <input type="email" id="loginEmail" autocomplete="username" required autofocus>
            </div>
            <div class="field">
                <label for="loginSenha">Senha</label>
                <input type="password" id="loginSenha" autocomplete="current-password" required>
            </div>
            <button type="submit" class="primary" id="btnLogin">
                <span class="spinner"></span>
                <span class="label">Entrar</span>
            </button>
            <div id="status" class="status"></div>
        </form>
    </div>
    <div class="foot">📍 R. Ilnah Pacheco Secundino de Oliveira, 160 · Cidade Industrial de Curitiba</div>
</div>

<script>
    const SUPABASE_URL = "https://jqamhqcfsolnjwrqliol.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_oG-dsQaetzJFQGQV4s3FWw_k4q-kQdt";
    const banco = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: true, autoRefreshToken: true }
    });

    // Se já está logado, redireciona direto
    (async function() {
        const { data: { session } } = await banco.auth.getSession();
        if (session) {
            await redirecionarAposLogin(session.user);
        }
    })();

    document.getElementById("formLogin").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value.trim();
        const senha = document.getElementById("loginSenha").value;
        const btn = document.getElementById("btnLogin");
        const st = document.getElementById("status");

        if (!email || !senha) {
            st.className = "status show err";
            st.textContent = "Informe e-mail e senha.";
            return;
        }

        btn.disabled = true; btn.classList.add("loading"); st.className = "status";

        try {
            const { data, error } = await banco.auth.signInWithPassword({ email, password: senha });
            if (error) throw error;

            st.className = "status show ok";
            st.textContent = "✓ Acesso concedido. Redirecionando...";

            await redirecionarAposLogin(data.user);
        } catch (error) {
            const msg = error.message === "Invalid login credentials"
                ? "E-mail ou senha incorretos."
                : error.message;
            st.className = "status show err";
            st.textContent = msg;
            btn.disabled = false; btn.classList.remove("loading");
        }
    });

    async function redirecionarAposLogin(user) {
        try {
            const { data: perfil } = await banco.from("perfis_operadores")
                .select("papel, ativo, deve_trocar_senha")
                .eq("id", user.id).single();

            if (perfil && perfil.deve_trocar_senha === true) {
                window.location.href = "trocar-senha.html";
                return;
            }
            if (perfil && perfil.ativo === false) {
                await banco.auth.signOut();
                const st = document.getElementById("status");
                st.className = "status show err";
                st.textContent = "Sua conta está desativada. Contate o administrador.";
                document.getElementById("btnLogin").disabled = false;
                document.getElementById("btnLogin").classList.remove("loading");
                return;
            }

            // Redireciona conforme papel
            if (perfil && perfil.papel === "PORTEIRO") {
                window.location.href = "portaria-painel.html";
            } else {
                window.location.href = "dashboard.html";
            }
        } catch (e) {
            // Sem perfil, mas autenticado: vai pro dashboard mesmo
            window.location.href = "dashboard.html";
        }
    }
</script>
</body>
</html>
